name: Build and push image to ACR

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: urbanwayacr.azurecr.io
  IMAGE: gtfscontainer-base
  RESOURCE_GROUP: urbanwaygroup

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push image to ACR
        run: az acr build --registry urbanwayacr --image ${{ env.IMAGE }}:latest .
